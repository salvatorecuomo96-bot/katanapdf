<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Handle (upper-left, diagonal) -->
  <rect x="8" y="5" width="13" height="33" rx="3"
        transform="rotate(45 14.5 21.5)"
        fill="#1a2744" stroke="#0d1525" stroke-width="2"/>
  <!-- Handle wrap lines -->
  <line x1="5" y1="20" x2="17" y2="8"  stroke="#2e4070" stroke-width="2"/>
  <line x1="9" y1="26" x2="21" y2="14" stroke="#2e4070" stroke-width="2"/>
  <line x1="13" y1="31" x2="25" y2="19" stroke="#2e4070" stroke-width="2"/>
  <!-- Pommel -->
  <ellipse cx="9" cy="11" rx="7" ry="5"
           transform="rotate(45 9 11)"
           fill="#1a2744" stroke="#0d1525" stroke-width="1.5"/>

  <!-- Tsuba (guard) - gold -->
  <ellipse cx="33" cy="33" rx="8" ry="4"
           transform="rotate(45 33 33)"
           fill="#9b8040" stroke="#6b5520" stroke-width="1.5"/>

  <!-- Blade body -->
  <polygon points="39,39 46,32 94,68 89,76"
           fill="#1a2744" stroke="#0d1525" stroke-width="1.5"/>
  <!-- Blade highlight / ridge -->
  <line x1="43" y1="34" x2="92" y2="70"
        stroke="#dce8f5" stroke-width="1.8" opacity="0.65"/>
  <!-- Blade tip point -->
  <polygon points="89,76 94,68 96,74"
           fill="#1a2744"/>
</svg>
