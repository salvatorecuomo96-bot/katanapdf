<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- dark background circle for visibility -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>

  <!-- Blade — long diagonal from top-left to mid-right -->
  <!-- Blade body (dark navy) -->
  <polygon points="12,18 18,12 82,58 78,65" fill="#1b2a4a" stroke="#0d1825" stroke-width="1.2"/>
  <!-- Blade edge highlight (bright silver streak) -->
  <line x1="15" y1="15" x2="80" y2="61" stroke="#c8d8f0" stroke-width="1.5" opacity="0.75"/>

  <!-- Tsuba / Guard (gold, perpendicular to blade) -->
  <ellipse cx="52" cy="50" rx="5" ry="13" transform="rotate(45 52 50)" fill="#9b8040" stroke="#6b5520" stroke-width="1.2"/>

  <!-- Handle (short, bottom-right) -->
  <rect x="54" y="52" width="10" height="28" rx="3" transform="rotate(45 59 66)" fill="#1b2a4a" stroke="#0d1825" stroke-width="1.2"/>
  <!-- Handle wrap lines -->
  <line x1="58" y1="60" x2="68" y2="56" stroke="#2e4a7a" stroke-width="1.5"/>
  <line x1="62" y1="65" x2="72" y2="61" stroke="#2e4a7a" stroke-width="1.5"/>
  <line x1="66" y1="70" x2="76" y2="66" stroke="#2e4a7a" stroke-width="1.5"/>
  <!-- Pommel (end cap) -->
  <ellipse cx="72" cy="76" rx="5" ry="4" transform="rotate(45 72 76)" fill="#1b2a4a" stroke="#0d1825" stroke-width="1.2"/>
</svg>
