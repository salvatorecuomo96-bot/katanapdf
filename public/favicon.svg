<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- petal 1 -->
  <ellipse cx="50" cy="26" rx="11" ry="22" rx="11" ry="22" fill="#fda4c8" stroke="#f472b6" stroke-width="1.5"/>
  <!-- petal 2 -->
  <ellipse cx="50" cy="26" rx="11" ry="22" fill="#fda4c8" stroke="#f472b6" stroke-width="1.5" transform="rotate(72 50 50)"/>
  <!-- petal 3 -->
  <ellipse cx="50" cy="26" rx="11" ry="22" fill="#fda4c8" stroke="#f472b6" stroke-width="1.5" transform="rotate(144 50 50)"/>
  <!-- petal 4 -->
  <ellipse cx="50" cy="26" rx="11" ry="22" fill="#fda4c8" stroke="#f472b6" stroke-width="1.5" transform="rotate(216 50 50)"/>
  <!-- petal 5 -->
  <ellipse cx="50" cy="26" rx="11" ry="22" fill="#fda4c8" stroke="#f472b6" stroke-width="1.5" transform="rotate(288 50 50)"/>
  <!-- petal notch lines (gives sakura heart-petal look) -->
  <line x1="50" y1="50" x2="50" y2="10" stroke="#f472b6" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="50" x2="50" y2="10" stroke="#f472b6" stroke-width="1" opacity="0.5" transform="rotate(72 50 50)"/>
  <line x1="50" y1="50" x2="50" y2="10" stroke="#f472b6" stroke-width="1" opacity="0.5" transform="rotate(144 50 50)"/>
  <line x1="50" y1="50" x2="50" y2="10" stroke="#f472b6" stroke-width="1" opacity="0.5" transform="rotate(216 50 50)"/>
  <line x1="50" y1="50" x2="50" y2="10" stroke="#f472b6" stroke-width="1" opacity="0.5" transform="rotate(288 50 50)"/>
  <!-- yellow center -->
  <circle cx="50" cy="50" r="10" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- stamens dots -->
  <circle cx="50" cy="42" r="2.2" fill="#d97706"/>
  <circle cx="57" cy="46" r="2.2" fill="#d97706"/>
  <circle cx="54" cy="55" r="2.2" fill="#d97706"/>
  <circle cx="46" cy="55" r="2.2" fill="#d97706"/>
  <circle cx="43" cy="46" r="2.2" fill="#d97706"/>
</svg>
