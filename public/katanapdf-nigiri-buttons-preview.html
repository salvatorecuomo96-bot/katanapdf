<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>katanapdf Nigiri Button Concepts</title>
<style>
  :root{
    --red:#8B1A1A;
    --ink:#18130d;
    --muted:rgba(24,19,13,.58);
    --line:rgba(116,86,44,.18);
    --gold:rgba(180,138,64,.38);
    --cream:#fffdf8;
    --paper:#f8f1df;
    --cinzel:"Cinzel", "Times New Roman", serif;
    --fell:"Lora", Georgia, "Times New Roman", serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(139,26,26,.06), transparent 34%),
      linear-gradient(to bottom, rgba(255,252,246,.96), rgba(246,238,220,.96));
    color:var(--ink);
    font-family:var(--fell);
    padding:42px 22px;
  }
  .wrap{max-width:1050px;margin:0 auto;}
  h1{font-family:var(--fell);font-size:clamp(30px,4vw,52px);font-weight:600;line-height:1.04;margin:0 0 10px;text-align:center;}
  h1 em{font-style:normal;color:var(--red)}
  p{max-width:640px;text-align:center;margin:0 auto 30px;color:var(--muted);font-size:15px;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}
  .card{position:relative;min-height:104px;border:1px solid var(--line);background:rgba(255,253,248,.72);box-shadow:0 12px 30px rgba(40,24,8,.05);display:flex;align-items:center;justify-content:center;padding:22px 18px;border-radius:5px;overflow:hidden;}
  .card:before{content:attr(data-n);position:absolute;top:10px;left:12px;font:800 10px var(--cinzel);letter-spacing:1.8px;color:rgba(139,26,26,.42)}
  .hp-kofi{display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;white-space:nowrap;cursor:pointer;transition:transform .13s,background .13s,border-color .13s,box-shadow .13s,color .13s;}
  .hp-kofi:hover{transform:translateY(-1px)}

  .hp-kofi-01{height:34px;padding:0 18px;border:1px solid rgba(139,26,26,.34);border-radius:999px;background:rgba(255,253,248,.72);color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;box-shadow:0 8px 20px rgba(40,24,8,.05)}
  .hp-kofi-01:hover{background:rgba(139,26,26,.05);border-color:var(--red)}

  .hp-kofi-02{height:36px;padding:0 20px;border:1px solid rgba(180,138,64,.42);border-radius:3px;background:linear-gradient(180deg,rgba(255,253,248,.86),rgba(246,238,220,.72));color:var(--ink);font-family:var(--cinzel);font-size:9px;letter-spacing:2.1px;text-transform:uppercase;font-weight:800;box-shadow:inset 0 0 0 1px rgba(255,255,255,.45),0 9px 22px rgba(40,24,8,.06)}
  .hp-kofi-02:hover{color:var(--red);border-color:rgba(139,26,26,.38)}

  .hp-kofi-03{height:34px;padding:0 19px 0 15px;border:1px solid rgba(139,26,26,.30);border-left:3px solid var(--red);border-radius:2px;background:rgba(255,253,248,.70);color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.7px;text-transform:uppercase;font-weight:800;box-shadow:0 8px 18px rgba(40,24,8,.045)}
  .hp-kofi-03:hover{background:rgba(139,26,26,.045);border-color:rgba(139,26,26,.48)}

  .hp-kofi-04{height:36px;padding:0 20px;border:1px solid rgba(24,19,13,.16);border-radius:999px;background:var(--red);color:#fffdf8;font-family:var(--cinzel);font-size:9px;letter-spacing:1.9px;text-transform:uppercase;font-weight:800;box-shadow:0 12px 24px rgba(139,26,26,.18)}
  .hp-kofi-04:hover{background:#781616;box-shadow:0 16px 30px rgba(139,26,26,.23)}

  .hp-kofi-05{height:34px;padding:0 18px;border:1px dashed rgba(139,26,26,.46);border-radius:999px;background:rgba(255,253,248,.52);color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;box-shadow:none}
  .hp-kofi-05:hover{background:rgba(255,253,248,.82);border-style:solid}

  .hp-kofi-06{height:35px;padding:0 20px;border:1px solid rgba(139,26,26,.30);border-radius:4px;background:linear-gradient(90deg,rgba(139,26,26,.075),rgba(255,253,248,.82) 34%,rgba(255,253,248,.82));color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.85px;text-transform:uppercase;font-weight:800;box-shadow:0 8px 20px rgba(40,24,8,.05)}
  .hp-kofi-06:hover{background:linear-gradient(90deg,rgba(139,26,26,.12),rgba(255,253,248,.9) 38%,rgba(255,253,248,.9))}

  .hp-kofi-07{height:34px;padding:0 18px;border:1px solid rgba(116,86,44,.24);border-radius:999px;background:rgba(255,253,248,.66);color:rgba(24,19,13,.72);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;box-shadow:0 8px 20px rgba(40,24,8,.045)}
  .hp-kofi-07:after{content:"";width:24px;height:1px;background:var(--red);opacity:.75;margin-left:2px}
  .hp-kofi-07:hover{color:var(--red);border-color:rgba(139,26,26,.32)}

  .hp-kofi-08{height:37px;padding:0 20px;border:1px solid rgba(139,26,26,.34);border-radius:0 999px 999px 0;background:rgba(255,253,248,.74);color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;box-shadow:-3px 0 0 rgba(139,26,26,.18),0 8px 18px rgba(40,24,8,.04)}
  .hp-kofi-08:hover{box-shadow:-3px 0 0 var(--red),0 10px 22px rgba(40,24,8,.06)}

  .hp-kofi-09{height:34px;padding:0 18px;border:1px solid rgba(139,26,26,.24);border-radius:3px;background:rgba(255,253,248,.68);color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;position:relative;box-shadow:0 8px 20px rgba(40,24,8,.045)}
  .hp-kofi-09:before,.hp-kofi-09:after{content:"";position:absolute;top:50%;width:18px;height:1px;background:rgba(139,26,26,.48)}
  .hp-kofi-09:before{right:calc(100% + 10px)} .hp-kofi-09:after{left:calc(100% + 10px)}
  .hp-kofi-09:hover{background:rgba(139,26,26,.045)}

  .hp-kofi-10{height:36px;padding:0 20px;border:1px solid rgba(139,26,26,.30);border-radius:999px;background:linear-gradient(180deg,rgba(255,253,248,.78),rgba(255,253,248,.62));color:var(--red);font-family:var(--cinzel);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;font-weight:800;box-shadow:0 0 0 4px rgba(139,26,26,.035),0 8px 20px rgba(40,24,8,.045)}
  .hp-kofi-10:hover{box-shadow:0 0 0 4px rgba(139,26,26,.07),0 10px 22px rgba(40,24,8,.06)}

  @media(max-width:700px){.grid{grid-template-columns:1fr}.card{min-height:92px}}
</style>
</head>
<body>
  <main class="wrap">
    <h1>Buy me a <em>nigiri</em></h1>
    <p>10 small support button concepts designed to sit just above the katanapdf footer.</p>
    <div class="grid">
      <div class="card" data-n="01"><a class="hp-kofi hp-kofi-01" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="02"><a class="hp-kofi hp-kofi-02" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="03"><a class="hp-kofi hp-kofi-03" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="04"><a class="hp-kofi hp-kofi-04" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="05"><a class="hp-kofi hp-kofi-05" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="06"><a class="hp-kofi hp-kofi-06" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="07"><a class="hp-kofi hp-kofi-07" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="08"><a class="hp-kofi hp-kofi-08" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="09"><a class="hp-kofi hp-kofi-09" href="#">🍣 Buy me a nigiri</a></div>
      <div class="card" data-n="10"><a class="hp-kofi hp-kofi-10" href="#">🍣 Buy me a nigiri</a></div>
    </div>
  </main>
</body>
</html>
