name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
        # Lint is informational until later phases clear the remaining errors
        # (Date.now/Math.random purity, no-control-regex, empty-catches with
        # comments). Don't block merges on it yet.
        continue-on-error: true
      - run: npm run build
      - run: npm run test:export
